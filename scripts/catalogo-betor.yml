---
id: betor
name: Catálogo BeTor
description: "Agregador de agregadores ;)"
language: pt-BR
type: public
encoding: UTF-8
links:
- https://catalogo.betor.top/

caps:
  categories:
    movie: Movies
    tv: TV
  modes:
    search: [q]
    movie-search: [q, imdbid]
    tv-search: [q, imdbid, season]

search:
  paths:
    - path: "{{ if .Query.Q }}/search/{{ else }}/{{ end }}{{ if .Query.IMDBID }}imdb/{{ .Query.IMDBID }}/{{ else }}filmes/{{ end }}"
      inputs:
        q: "{{ .Query.Q }}"
      categories: ["movie"]
    - path: "{{ if .Query.Q }}/search/{{ else }}/{{ end }}{{ if .Query.IMDBID }}imdb/{{ .Query.IMDBID }}/{{ else }}{{ end }}{{ if and (.Query.IMDBID) (.Query.Season) }}season/{{ .Query.Season }}/{{ else }}{{ end }}{{ if or (.Query.IMDBID) (.Query.Season) }}{{ else }}series/{{ end }}"
      inputs:
        q: "{{ .Query.Q }}"
      categories: ["tv"]
  rows:
    selector: "[data-torrent]"
  fields:
    _torrent_name:
      attribute: data-torrent-name
      filters:
        - name: re_replace
          args: ["(?i)\\.(mkv|mp4)$", ""]
        - name: re_replace
          args: ["\\[[^\\]]*\\]$", ""]
        - name: re_replace
          args: [",", ""]
        - name: re_replace
          args: ["(?i)STARCKFILMES", ""]
        - name: re_replace
          args: ["(?i)-SF", ""]
        - name: re_replace
          args: ["(?i)WEB[\\.\\s\\-_]+DL", "WEBDL"]
        - name: re_replace
          args: ["(?i)BluRay", "Bluray"]
        - name: re_replace
          args: ["\\s+", "."]
        - name: re_replace
          args: ["_+", "."]
        - name: re_replace
          args: ["\\.\\.+", "."]
        - name: re_replace
          args: ["[-.]+$", ""]
    _languages_tags:
      attribute: data-torrent-languages
      filters:
        - name: replace
          args: ["en", "english"]
        - name: replace
          args: ["pt-BR", "brazilian"]
        - name: replace
          args: ["pt", "portuguese"]
        - name: re_replace
          args: ["\\s+", ","]
    title:
      text: "{{ .Result._torrent_name }}{{ if .Result._languages_tags }} [{{ .Result._languages_tags }}]{{ else }} [VAZIO]{{ end }}"
      filters:
        - name: re_replace
          args: ["(?i)DUAL(.*?)\\s*\\[VAZIO\\]", "DUAL$1 [portuguese,english]"]
        - name: replace
          args: [" [VAZIO]", ""]
    category:
      attribute: data-item-type
    details:
      attribute: data-provider-url
    magnet:
      attribute: data-torrent-magnet-uri
    imdbid:
      attribute: data-item-imdb-id
    tmdbid:
      attribute: data-item-tmdb-id
    date:
      attribute: data-torrent-inserted-at
    size:
      attribute: data-torrent-size
    seeders:
      attribute: data-torrent-num-seeds
    leechers:
      attribute: data-torrent-num-peers

# json engine n/a
