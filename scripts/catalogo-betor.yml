---
id: betor
name: Catálogo BeTor
description: "Agregador de agregadores ;)"
language: pt-BR
type: public
encoding: UTF-8
links:
- https://catalogo.betor.top/

caps:
  categories:
    movie: Movies
    tv: TV
  modes:
    search: [q]
    movie-search: [q, imdbid]
    tv-search: [q, imdbid, season]

search:
  paths:
  - path: "{{ if .Query.Q }}/search/{{ else }}/{{ end }}{{ if .Query.IMDBID }}imdb/{{ .Query.IMDBID }}/{{ else }}filmes/{{ end }}"
    inputs:
      q: "{{ .Query.Q }}"
    categories: ["movie"]
  - path: "{{ if .Query.Q }}/search/{{ else }}/{{ end }}{{ if .Query.IMDBID }}imdb/{{ .Query.IMDBID }}/{{ else }}{{ end }}{{ if and (.Query.IMDBID) (.Query.Season) }}season/{{ .Query.Season }}/{{ else }}{{ end }}{{ if or (.Query.IMDBID) (.Query.Season) }}{{ else }}series/{{ end }}"
    inputs:
      q: "{{ .Query.Q }}"
    categories: ["tv"]

  rows:
    selector: "[data-torrent]"

  fields:
    _torrent_name:
      attribute: data-torrent-name
      filters:
      - name: re_replace
        args: ["(?i)\\bAMZN\\b",""]
      - name: re_replace
        args: ["(?i)\\b4K\\b",""]
      - name: re_replace
        args: ["(?i)\\b10bit\\b",""]              
      - name: re_replace
        args: ["(?i)\\.(mkv|mp4)$",""]
      - name: re_replace
        args: ["[\\(\\)]",""]
      - name: re_replace
        args: ["[\\[\\]]",""]
      - name: re_replace
        args: [",",""]
      - name: re_replace
        args: ["(?i)STARCKFILMES",""]
      - name: re_replace
        args: ["(?i)www\\.UIndex\\.org",""]
      - name: re_replace
        args: ["(?i)YTS\\.GG\\.YTS\\.BZ",""]
      - name: re_replace
        args: ["(?i)YTS\\.GG\\.\\-\\.YTS\\.BZ",""]
      - name: re_replace
        args: ["(?i)-Ben\\.The\\.Men",""]
      - name: re_replace
        args: ["(?i)-MIRCrew",""]
      - name: re_replace
        args: ["(?i)-SF",""]
      - name: re_replace
        args: ["(?i)\\bSF\\b",""]
      - name: re_replace
        args: ["(?i)\\bV\\.2\\b",""]
      - name: re_replace
        args: ["(?i)\\bSub\\b",""]
      - name: re_replace
        args: ["^(\\.\\-\\.)+",""]
      - name: re_replace
        args: ["\\.\\-\\.","."]
      - name: re_replace
        args: ["(?i)\\biTA\\b","ITA"]
      - name: re_replace
        args: ["(?i)\\bEnG\\b","ENG"]
      - name: re_replace
        args: ["(?i)WEB[\\.\\s\\-_]+DL","WEBDL"]
      - name: re_replace
        args: ["(?i)BluRay","Bluray"]
      - name: re_replace
        args: ["\\s+","."]
      - name: re_replace
        args: ["_+","."]
      - name: re_replace
        args: ["\\.\\.+","."]
      - name: re_replace
        args: ["\\.\\-\\.","."]
      - name: re_replace
        args: ["\\.{2,}","."]
      - name: re_replace
        args: ["(?i)YTS\\.GG\\.YTS\\.BZ",""]
      - name: re_replace
        args: ["(?i)-Ben\\.The\\.Men",""]
      - name: replace
        args: ["ITA.ITA","ITA"]
      - name: replace
        args: ["ENG.ENG","ENG"]
      - name: replace
        args: ["FRE.FRE","FRE"]
      - name: replace
        args: ["GER.GER","GER"]
      - name: replace
        args: ["SPA.SPA","SPA"]
      - name: replace
        args: ["POR.POR","POR"]
      - name: replace
        args: ["ITA.ENG.ITA","ITA.ENG"]
      - name: replace
        args: ["ENG.ITA.ENG","ENG.ITA"]
      - name: replace
        args: ["ITA.ENG.ITA.ENG","ITA.ENG"]
      - name: replace
        args: ["ENG.ITA.ENG.ITA","ENG.ITA"]
      - name: re_replace
        args: ["\\.{2,}","."]
      - name: re_replace
        args: ["(^[.-]+|[.-]+$)",""]

    _languages_tags:
      attribute: data-torrent-languages
      filters:
      - name: replace
        args: ["en","english"]
      - name: replace
        args: ["pt-BR","brazilian"]
      - name: replace
        args: ["pt","portuguese"]
      - name: re_replace
        args: ["\\s+",","]

    title:
      text: "{{ .Result._torrent_name }}"
      filters:
      - name: re_replace
        args: ["^(.+)$","$1 [english]"]
      - name: re_replace
        args: ["(?i)^(.*\\bDublado\\b.*) \\[english\\]$","$1 [brazilian]"]
      - name: re_replace
        args: ["(?i)^(.*\\bDUAL\\b.*) \\[english\\]$","$1 [portuguese,english]"]
      - name: re_replace
        args: ["(?i)^(.*\\bITA\\.ENG\\b.*) \\[english\\]$","$1 [italian,english]"]
      - name: re_replace
        args: ["(?i)^(.*\\bITA\\b.*) \\[english\\]$","$1 [italian]"]
      - name: re_replace
        args: ["(?i)^(.*\\bPOR\\b.*) \\[english\\]$","$1 [portuguese]"]
      - name: re_replace
        args: ["(?i)^(.*\\bFRE\\b.*) \\[english\\]$","$1 [french]"]
      - name: re_replace
        args: ["(?i)^(.*\\bGER\\b.*) \\[english\\]$","$1 [german]"]
      - name: re_replace
        args: ["(?i)^(.*\\bSPA\\b.*) \\[english\\]$","$1 [spanish]"]
            
    category:
      attribute: data-item-type
    details:
      attribute: data-provider-url
    magnet:
      attribute: data-torrent-magnet-uri
    imdbid:
      attribute: data-item-imdb-id
    tmdbid:
      attribute: data-item-tmdb-id
    date:
      attribute: data-torrent-inserted-at
    size:
      attribute: data-torrent-size
    seeders:
      attribute: data-torrent-num-seeds
    leechers:
      attribute: data-torrent-num-peers

# json engine n/a